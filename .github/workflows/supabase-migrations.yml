name: Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-migrations.yml"

concurrency:
  group: supabase-migrations-main
  cancel-in-progress: false

jobs:
  migrate:
    name: Push Supabase migrations
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify Supabase secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "Missing GitHub Secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          if [ -z "${SUPABASE_PROJECT_ID}" ]; then
            echo "Missing GitHub Secret: SUPABASE_PROJECT_ID"
            exit 1
          fi

          if [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "Missing GitHub Secret: SUPABASE_DB_PASSWORD"
            exit 1
          fi

      - name: Show Supabase CLI version
        run: supabase --version

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Dry run migrations
        run: supabase db push --dry-run --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"
