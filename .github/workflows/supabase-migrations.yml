name: Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-migrations.yml"

concurrency:
  group: supabase-migrations-main
  cancel-in-progress: false

jobs:
  migrate:
    name: Push Supabase migrations
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_TELEMETRY_DISABLED: "1"
      SUPABASE_CLI_TELEMETRY_DISABLED: "1"
      POSTHOG_DISABLED: "1"
      DO_NOT_TRACK: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Verify Supabase secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "Missing GitHub Secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          if [ -z "${SUPABASE_PROJECT_ID}" ]; then
            echo "Missing GitHub Secret: SUPABASE_PROJECT_ID"
            exit 1
          fi

          if [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "Missing GitHub Secret: SUPABASE_DB_PASSWORD"
            exit 1
          fi

      - name: Show Supabase CLI version
        run: supabase --version

      - name: Link Supabase project
        shell: bash
        run: |
          set -euo pipefail

          set +e
          supabase --debug link --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee supabase-link.log
          link_status="${PIPESTATUS[0]}"
          set -e

          if [ "$link_status" -eq 0 ]; then
            exit 0
          fi

          if grep -q "Finished supabase link." supabase-link.log \
            && [ -f "supabase/.temp/project-ref" ] \
            && grep -q "$SUPABASE_PROJECT_ID" supabase/.temp/project-ref; then
            echo "::warning::Supabase CLI link completed but returned exit code ${link_status}. Continuing because project link was written successfully."
            exit 0
          fi

          echo "Supabase link failed before project link was completed."
          exit "$link_status"

      - name: Dry run migrations
        run: supabase --debug db push --dry-run

      - name: Push migrations
        run: supabase --debug db push
